<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VDownload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">VDownload</h1>
  <input type="text" id="search" placeholder="Search movies...">
</header>

<section class="hero" id="hero">
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <h2 id="heroTitle"></h2>
    <p id="heroDesc"></p>
    <button id="heroBtn" class="hero-btn">⬇ Download</button>
  </div>
</section>

<section class="row">
  <h2>Trending Now</h2>

  <div class="row-wrapper">
    <button class="scroll-btn left" onclick="scrollRow(-1)">❮</button>

    <div class="movie-row" id="movieContainer"></div>

    <button class="scroll-btn right" onclick="scrollRow(1)">❯</button>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
