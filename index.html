<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VDownload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">VDownload</h1>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search movies...">
    <button class="search-btn" onclick="doSearch()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>
</header>

<section class="hero" id="hero">
  <div id="heroTrailerWrap"></div>
  <img id="heroPoster" src="" alt="" />
  <div class="hero-overlay"></div>
  <div id="volumeWrap">
    <button id="muteBtn" onclick="toggleMute()">🔇</button>
    <input type="range" id="volumeSlider" min="0" max="100" value="0" oninput="setVolume(this.value)">
  </div>
  <div class="hero-content">
    <h2 id="heroTitle"></h2>
    <p id="heroDesc"></p>
    <button id="heroBtn" class="hero-btn">⬇ Download</button>
  </div>
</section>

<div id="categoriesContainer"></div>

<script src="movies.js"></script>
<script src="script.js"></script>
</body>
</html>
