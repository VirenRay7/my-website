<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Category — KDownload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="style.css">
  <style>
    .cat-page {
      padding: 70px 14px 40px;
      min-height: 100vh;
    }

    .cat-page .page-title {
      font-size: clamp(1rem, 3vw, 1.8rem);
      margin-bottom: 20px;
      padding-left: 4px;
    }

    .cat-page .page-title span { color: #f5a623; }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    .cat-grid .movie-card {
      width: 100%;
      flex: unset;
      aspect-ratio: 16/9;
      height: auto;
    }

    .empty { color: #555; margin-top: 60px; text-align: center; font-size: 1rem; }

    @media (max-width: 480px) {
      .cat-page { padding: 62px 10px 30px; }
      .cat-grid {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 8px;
      }
      .cat-grid .movie-card { aspect-ratio: unset; height: 165px; }
    }

    @media (max-width: 360px) {
      .cat-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }
      .cat-grid .movie-card { height: 143px; }
    }
  </style>
</head>
<body>

<header class="navbar">
  <a href="index.html" class="logo-link">
    <span class="logo"><span class="logo-k">K</span><span class="logo-rest">Download</span></span>
  </a>
  <input type="text" id="search" placeholder="Search movies..." autocomplete="off">
</header>

<div class="cat-page">
  <h2 class="page-title" id="pageTitle"></h2>
  <div class="cat-grid" id="catGrid"></div>
  <p class="empty" id="emptyMsg" style="display:none;">No movies in this category yet.</p>
</div>

<script src="movies.js"></script>
<script>
  const params  = new URLSearchParams(window.location.search);
  const catId   = params.get("cat") || "";
  const catMeta = categories.find(c => c.id === catId);

  // set page title
  const titleEl = document.getElementById("pageTitle");
  if (catMeta) {
    titleEl.innerHTML = `<span>${catMeta.label}</span>`;
    document.title = `${catMeta.label} — VDownload`;
  } else {
    titleEl.textContent = "Category";
  }

  // render cards
  const grid = document.getElementById("catGrid");
  const list = movies.filter(m => m.category === catId);

  if (!list.length) {
    document.getElementById("emptyMsg").style.display = "block";
  } else {
    list.forEach(movie => {
      const card = document.createElement("div");
      card.classList.add("movie-card");
      const isMob = window.innerWidth <= 480;
      const src   = isMob ? (movie.img || movie.bg) : (movie.bg || movie.img);
      card.innerHTML = `
        <img src="${src}" alt="${movie.title}">
        <div class="overlay">
          <h4>${movie.title}</h4>
          <button onclick="event.stopPropagation(); window.open('${movie.download}', '_blank')">
            ⬇ Download
          </button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // search
  document.getElementById("search").addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const val = e.target.value.trim();
      if (val) window.location.href = `search.html?q=${encodeURIComponent(val)}`;
    }
  });
</script>
</body>
</html>
