<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trending Now — VDownload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="style.css">
  <style>
    .trending-page {
      padding: 70px 14px 40px;
      min-height: 100vh;
    }

    .trending-page .page-title {
      font-size: clamp(1rem, 3vw, 1.8rem);
      margin-bottom: 20px;
      padding-left: 4px;
    }

    .trending-page .page-title span { color: #f5a623; }

    .trending-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    .trending-grid .movie-card {
      width: 100%;
      flex: unset;
      aspect-ratio: 16/9;
      height: auto;
    }

    @media (max-width: 480px) {
      .trending-page { padding: 62px 10px 30px; }
      .trending-grid {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 8px;
      }
      .trending-grid .movie-card { aspect-ratio: unset; height: 165px; }
    }

    @media (max-width: 360px) {
      .trending-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }
      .trending-grid .movie-card { height: 143px; }
    }
  </style>
</head>
<body>

<header class="navbar">
  <a href="index.html" class="logo-link">
    <span class="logo"><span class="logo-k">K</span><span class="logo-rest">Download</span></span>
  </a>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search movies..." autocomplete="off">
    <button class="search-btn" onclick="doSearch()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>
</header>

<div class="trending-page">
  <h2 class="page-title">Trending <span>Now</span></h2>
  <div class="trending-grid" id="trendingGrid"></div>
</div>

<script src="movies.js"></script>
<script>
  const grid = document.getElementById("trendingGrid");

  movies.forEach(movie => {
    const card = document.createElement("div");
    card.classList.add("movie-card");
    card.innerHTML = `
      <img src="${movie.img}" alt="${movie.title}">
      <div class="overlay">
        <h4>${movie.title}</h4>
        <button onclick="event.stopPropagation(); window.open('${movie.download}', '_blank')">
          ⬇ Download
        </button>
      </div>
    `;
    grid.appendChild(card);
  });

  // search
  function doSearch() {
    const val = document.getElementById("search").value.trim();
    if (val) window.location.href = `search.html?q=${encodeURIComponent(val)}`;
  }

  document.getElementById("search").addEventListener("keydown", e => {
    if (e.key === "Enter") doSearch();
  });
</script>
</body>
</html>
